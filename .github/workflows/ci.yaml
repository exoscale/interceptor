name: CI

on: [push, pull_request]

jobs:

  test:

    strategy:
      matrix:
        os: [ubuntu-latest] # macOS-latest, windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # It is important to install java before installing clojure tools which needs java
      # exclusions: babashka, clj-kondo and cljstyle
      - name: Prepare java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v6
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Install clojure tools
        uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          lein: latest                 # Leiningen
          # bb: latest                   # Babashka

      - name: Setup bb from master
        run: |
          bash <(curl https://raw.githubusercontent.com/babashka/babashka/master/install) \
            --version 0.9.163-SNAPSHOT --dir /usr/local/bin

      # Optional step:
      - name: Cache clojure dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          # List all files containing dependencies:
          key: cljdeps-${{ hashFiles('project', 'bb.edn') }}
          restore-keys: cljdeps-

      - name: Test Clojure
        run: bb test:clj

      - name: Test Babashka
        run: bb test:bb
